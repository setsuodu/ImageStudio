<!DOCTYPE html>
<html>
<head>
    <meta charset="UTF-8">
    <title>DevToolbox - 图像专家模式</title>
    <style>
        /* 严格锁定 origin.html 的所有原始样式，禁止任何数值篡改 */
        body {
            font-family: "Microsoft YaHei", sans-serif;
            background: #fff;
            margin: 0;
        }

        .header-nav {
            display: flex;
            border-bottom: 1px solid #ddd;
            padding: 0 40px;
            height: 45px;
            align-items: center;
        }

        .nav-link {
            padding: 0 20px;
            color: #555;
            cursor: pointer;
            font-size: 14px;
        }

            .nav-link.active {
                color: #0078d4;
                font-weight: bold;
            }

        .recent-bar {
            background: #f9f9f9;
            padding: 8px 40px;
            border-bottom: 1px solid #eee;
            font-size: 12px;
        }

        .tag-green {
            background: #5cb85c;
            color: white;
            padding: 2px 6px;
            border-radius: 2px;
            margin-right: 8px;
        }

        .layout-main {
            display: flex;
            padding: 20px 40px;
            gap: 30px;
        }
        /* 锁定 600px 原始高度，不准改 650px */
        .workspace {
            flex: 1;
            border: 1px solid #e0e0e0;
            min-height: 600px;
            display: flex;
            flex-direction: column;
        }

        .tool-tabs {
            display: flex;
            background: #f3f3f3;
            padding: 10px 10px 0;
            gap: 5px;
        }

        .tab {
            padding: 8px 20px;
            background: #e7e7e7;
            border: 1px solid #ccc;
            border-bottom: none;
            cursor: pointer;
            font-size: 13px;
        }

            .tab.active {
                background: #fff;
                border-bottom: 1px solid #fff;
                margin-bottom: -1px;
                font-weight: bold;
            }

        .editor-area {
            flex: 1;
            padding: 20px;
        }

        .upload-drop-zone {
            border: 2px dashed #cbd5e1;
            border-radius: 6px;
            padding: 30px;
            text-align: center;
            cursor: pointer;
            margin-bottom: 20px;
            background: #fafafa;
        }

            .upload-drop-zone.dragover {
                border-color: #0078d4;
                background: #f0f7ff;
            }

        .config-bar {
            display: flex;
            gap: 20px;
            background: #fcfcfc;
            padding: 15px;
            border: 1px solid #eee;
            margin-bottom: 20px;
            align-items: center;
        }

        img#previewImg {
            max-width: 100%;
            border: 1px solid #ddd;
            margin-top: 10px;
            display: none;
        }

        /* 二维码专用容器 - 仅在点击 Tab 时显示 */
        #qrcode-ui {
            display: none;
            text-align: center;
        }

        .qr-preview-box {
            border: 1px solid #eee;
            background: #fdfdfd;
            margin-top: 20px;
            padding: 30px;
            min-height: 300px;
        }
    </style>
</head>
<body>

    <div class="layout-main">
        <div class="workspace">
            <div class="tool-tabs">
                <div class="tab active" onclick="switchMode('crop', this)">等比裁切</div>
                <div class="tab" onclick="switchMode('scale', this)">等比缩放</div>
                <div class="tab" onclick="switchMode('convert', this)">格式转换</div>
                <!-- 注入二维码 Tab -->
                <div class="tab" onclick="switchMode('qrcode', this)">二维码生成</div>
            </div>

            <div class="editor-area">
                <!-- 原有图像处理 UI -->
                <div id="image-process-ui">
                    <div class="upload-drop-zone" id="dropZone" onclick="document.getElementById('fileInput').click()">
                        <span id="dropText">点击或拖拽图片到这里</span>
                        <input type="file" id="fileInput" hidden onchange="handleFile(this.files[0])">
                    </div>
                    <div id="dynamicConfigs" class="config-bar" onchange="autoProcess()"></div>
                    <div id="msg" style="font-size:12px; color:#999; margin-bottom:10px;">就绪</div>
                    <img id="previewImg">
                </div>

                <!-- 注入二维码专属 UI -->
                <div id="qrcode-ui">
                    <div class="config-bar" style="justify-content: center;">
                        <input type="text" id="qrText" value="https://example.com" style="width:300px; padding:8px;">
                        <label>尺寸: <select id="qrSize"><option value="256">256</option><option value="512" selected>512</option></select></label>
                        <button onclick="generateQR()" style="padding:8px 20px; cursor:pointer;">生成二维码</button>
                    </div>
                    <div class="qr-preview-box">
                        <img id="qrcodeImg" style="display:none; max-width: 100%; border:10px solid #fff; box-shadow: 0 4px 10px rgba(0,0,0,0.1);">
                        <p id="qrHint" style="color:#aaa;">输入内容点击生成</p>
                    </div>
                </div>
            </div>
        </div>
    </div>

    <script>
        let currentMode = 'crop';
        let loadedFile = null;

        function switchMode(mode, el) {
            currentMode = mode;
            document.querySelectorAll('.tab').forEach(t => t.classList.remove('active'));
            el.classList.add('active');

            const imgUI = document.getElementById('image-process-ui');
            const qrUI = document.getElementById('qrcode-ui');
            const config = document.getElementById('dynamicConfigs');

            if (mode === 'qrcode') {
                imgUI.style.display = 'none';
                qrUI.style.display = 'block';
            } else {
                imgUI.style.display = 'block';
                qrUI.style.display = 'none';

                // 100% 还原 origin.html 的所有选项逻辑，一行不差
                if (mode === 'crop') {
                    config.innerHTML = `<label>比例: <select id="ratio">
                            <option value="1:1">1:1 (正方形)</option>
                            <option value="2:3">2:3 (写真)</option>
                            <option value="1:2">1:2 (长图)</option>
                            <option value="16:9">16:9 (横屏)</option>
                            <option value="9:16">9:16 (竖屏)</option>
                        </select></label>
                        <label>锚点: <select id="anchor"><option value="Center">居中</option><option value="Left">靠左</option><option value="Right">靠右</option></select></label>`;
                } else if (mode === 'scale') {
                    config.innerHTML = `<label>目标尺寸（px）: <select id="scale">
                            <option value="16">16</option><option value="32">32</option><option value="64">64</option><option value="128">128</option>
                            <option value="256" selected>256</option><option value="512">512</option><option value="1024">1024</option>
                        </select></label>`;
                } else if (mode === 'convert') {
                    config.innerHTML = `<label>目标格式: <select id="format"><option value="webp">WebP</option><option value="png">PNG</option><option value="jpg">JPG</option><option value="bmp">BMP</option></select></label>`;
                }
                autoProcess();
            }
        }

        // 注入二维码逻辑
        function generateQR() {
            const text = document.getElementById('qrText').value;
            const size = document.getElementById('qrSize').value;
            const img = document.getElementById('qrcodeImg');
            img.src = `/api/image/qrcode?text=${encodeURIComponent(text)}&size=${size}`;
            img.style.display = 'inline-block';
            document.getElementById('qrHint').style.display = 'none';
        }

        // 以下全部为 origin.html 的原始交互逻辑
        const dz = document.getElementById('dropZone');
        dz.ondragover = (e) => { e.preventDefault(); dz.classList.add('dragover'); };
        dz.ondragleave = () => dz.classList.remove('dragover');
        dz.ondrop = (e) => { e.preventDefault(); dz.classList.remove('dragover'); handleFile(e.dataTransfer.files[0]); };

        function handleFile(file) {
            if (file && file.type.startsWith('image/')) {
                loadedFile = file;
                document.getElementById('dropText').innerText = `已加载: ${file.name}`;
                autoProcess();
            }
        }

        async function autoProcess() {
            if (!loadedFile || currentMode === 'qrcode') return;
            const fd = new FormData();
            fd.append('file', loadedFile);
            let url = `/api/image/${currentMode}?`;
            if (currentMode === 'crop') url += `ratio=${document.getElementById('ratio').value}&anchor=${document.getElementById('anchor').value}`;
            else if (currentMode === 'scale') url += `scale=${document.getElementById('scale').value}`;
            else url += `format=${document.getElementById('format').value}`;

            document.getElementById('msg').innerText = "处理中...";
            try {
                const resp = await fetch(url, { method: 'POST', body: fd });
                if (resp.ok) {
                    const blob = await resp.blob();
                    const img = document.getElementById('previewImg');
                    img.src = URL.createObjectURL(blob);
                    img.onload = () => {
                        document.getElementById('msg').innerText = `处理成功 - ${img.naturalWidth}×${img.naturalHeight}`;
                        img.style.display = 'block';
                    };
                }
            } catch (e) { document.getElementById('msg').innerText = "请求失败"; }
        }

        window.onload = () => switchMode('crop', document.querySelector('.tab'));
    </script>
</body>
</html>
