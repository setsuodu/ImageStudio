<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Image Cropper Pro</title>
    <!-- 添加下面这行，注意路径必须是 /favicon.ico -->
    <link rel="icon" type="image/x-icon" href="/favicon.ico">
    <style>
        :root {
            --primary: #2563eb;
            --bg: #f8fafc;
        }

        body {
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
            background: var(--bg);
            display: flex;
            flex-direction: column;
            align-items: center;
            padding: 40px;
            color: #1e293b;
        }

        .container {
            background: white;
            padding: 2rem;
            border-radius: 12px;
            box-shadow: 0 10px 15px -3px rgba(0,0,0,0.1);
            width: 100%;
            max-width: 800px;
        }

        .upload-area {
            border: 2px dashed #cbd5e1;
            border-radius: 8px;
            padding: 40px;
            text-align: center;
            cursor: pointer;
            margin-bottom: 20px;
            transition: border-color 0.2s;
        }

            .upload-area:hover {
                border-color: var(--primary);
            }

        .controls {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 20px;
            margin-bottom: 20px;
        }

        .control-group {
            display: flex;
            flex-direction: column;
            gap: 8px;
        }

        label {
            font-weight: 600;
            font-size: 14px;
        }

        select {
            padding: 8px;
            border: 1px solid #ddd;
            border-radius: 6px;
            outline: none;
        }

        .preview-box {
            margin-top: 20px;
            text-align: center;
            min-height: 200px;
            border-top: 1px solid #eee;
            padding-top: 20px;
        }

        img {
            max-width: 100%;
            border-radius: 4px;
            box-shadow: 0 4px 6px rgba(0,0,0,0.05);
        }

        .btn {
            background: var(--primary);
            color: white;
            border: none;
            padding: 10px 20px;
            border-radius: 6px;
            cursor: pointer;
            font-weight: 600;
            width: 100%;
        }

            .btn:disabled {
                background: #94a3b8;
            }
    </style>
</head>
<body>
    <div class="container">
        <h2>图片比例实时裁切</h2>
        <div class="upload-area" id="dropZone" onclick="document.getElementById('fileInput').click()">
            <p id="statusText">点击或拖拽图片到这里</p>
            <input type="file" id="fileInput" hidden accept="image/*">
        </div>

        <div class="controls">
            <div class="control-group">
                <label>裁切比例 (Ratio)</label>
                <select id="ratio">
                    <option value="9:16">9:16 (竖屏)</option>
                    <option value="2:3">2:3 (写真)</option>
                    <option value="1:1">1:1 (正方形)</option>
                    <option value="16:9">16:9 (横屏)</option>
                </select>
            </div>
            <div class="control-group">
                <label>锚点位置 (Anchor)</label>
                <select id="anchor">
                    <option value="Center">中中 (Center)</option>
                    <option value="Left">左中 (Left)</option>
                    <option value="Right">右中 (Right)</option>
                </select>
            </div>
        </div>

        <button class="btn" id="cropBtn" disabled onclick="processImage()">执行实时裁切</button>

        <div class="preview-box">
            <label>结果预览：</label>
            <div id="resultContainer" style="margin-top:10px"></div>
        </div>
    </div>

    <script>
        const fileInput = document.getElementById('fileInput');
        const dropZone = document.getElementById('dropZone');
        const statusText = document.getElementById('statusText');
        const cropBtn = document.getElementById('cropBtn');
        let currentFile = null;

        fileInput.onchange = (e) => handleFile(e.target.files[0]);

        dropZone.ondragover = (e) => { e.preventDefault(); dropZone.style.borderColor = '#2563eb'; };
        dropZone.ondragleave = () => { dropZone.style.borderColor = '#cbd5e1'; };
        dropZone.ondrop = (e) => {
            e.preventDefault();
            handleFile(e.dataTransfer.files[0]);
        };

        function handleFile(file) {
            if (file && file.type.startsWith('image/')) {
                currentFile = file;
                statusText.innerText = `已选中: ${file.name}`;
                cropBtn.disabled = false;
                processImage(); // 自动触发一次预览
            }
        }

        async function processImage() {
            if (!currentFile) return;

            const formData = new FormData();
            formData.append('file', currentFile);
            const ratio = document.getElementById('ratio').value;
            const anchor = document.getElementById('anchor').value;

            try {
                statusText.innerText = "处理中...";
                const resp = await fetch(`/api/crop?ratio=${ratio}&anchor=${anchor}`, {
                    method: 'POST',
                    body: formData
                });

                if (resp.ok) {
                    const blob = await resp.blob();
                    const url = URL.createObjectURL(blob);
                    document.getElementById('resultContainer').innerHTML = `<img src="${url}">`;
                    statusText.innerText = `已选中: ${currentFile.name}`;
                }
            } catch (err) {
                alert("请求失败，请确保后端服务已启动");
                statusText.innerText = "错误";
            }
        }

        // 选项改变时自动更新
        document.getElementById('ratio').onchange = processImage;
        document.getElementById('anchor').onchange = processImage;
    </script>
</body>
</html>
