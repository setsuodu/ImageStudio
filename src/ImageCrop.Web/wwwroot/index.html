<!DOCTYPE html>
<html>
<head>
    <meta charset="UTF-8">
    <title>DevToolbox - 图像专家模式</title>
    <style>
        body {
            font-family: "Microsoft YaHei", sans-serif;
            background: #fff;
            margin: 0;
        }

        .header-nav {
            display: flex;
            border-bottom: 1px solid #ddd;
            padding: 0 40px;
            height: 45px;
            align-items: center;
        }

        .nav-link {
            padding: 0 20px;
            color: #555;
            cursor: pointer;
            font-size: 14px;
        }

            .nav-link.active {
                color: #0078d4;
                font-weight: bold;
            }

        .recent-bar {
            background: #f9f9f9;
            padding: 8px 40px;
            border-bottom: 1px solid #eee;
            font-size: 12px;
        }

        .tag-green {
            background: #5cb85c;
            color: white;
            padding: 2px 6px;
            border-radius: 2px;
            margin-right: 8px;
        }

        .layout-main {
            display: flex;
            padding: 20px 40px;
            gap: 30px;
        }

        .workspace {
            flex: 1;
            border: 1px solid #e0e0e0;
            min-height: 600px;
            display: flex;
            flex-direction: column;
        }

        .tool-tabs {
            display: flex;
            background: #f3f3f3;
            padding: 10px 10px 0;
            gap: 5px;
        }

        .tab {
            padding: 8px 20px;
            background: #e7e7e7;
            border: 1px solid #ccc;
            border-bottom: none;
            cursor: pointer;
            font-size: 13px;
        }

            .tab.active {
                background: #fff;
                border-bottom: 1px solid #fff;
                margin-bottom: -1px;
                font-weight: bold;
            }

        .editor-area {
            flex: 1;
            padding: 20px;
        }

        .upload-drop-zone {
            border: 2px dashed #cbd5e1;
            border-radius: 6px;
            padding: 30px;
            text-align: center;
            cursor: pointer;
            margin-bottom: 20px;
            background: #fafafa;
        }

            .upload-drop-zone.dragover {
                border-color: #0078d4;
                background: #f0f7ff;
            }

        .config-bar {
            display: flex;
            gap: 20px;
            background: #fcfcfc;
            padding: 15px;
            border: 1px solid #eee;
            margin-bottom: 20px;
            align-items: center;
        }

        img#previewImg {
            max-width: 100%;
            border: 1px solid #ddd;
            margin-top: 10px;
            display: none;
        }
    </style>
</head>
<body>

    <div class="layout-main">
        <div class="workspace">
            <div class="tool-tabs">
                <div class="tab active" onclick="switchMode('crop', this)">等比裁切</div>
                <div class="tab" onclick="switchMode('scale', this)">等比缩放</div>
                <div class="tab" onclick="switchMode('convert', this)">格式转换</div>
            </div>

            <div class="editor-area">
                <div class="upload-drop-zone" id="dropZone" onclick="document.getElementById('fileInput').click()">
                    <span id="dropText">点击或拖拽图片到这里</span>
                    <input type="file" id="fileInput" hidden onchange="handleFile(this.files[0])">
                </div>

                <!-- 配置栏：找回所有缺失比例和实时监听 -->
                <div id="dynamicConfigs" class="config-bar" onchange="autoProcess()">
                    <label>
                        比例:
                        <select id="ratio">
                            <option value="1:1">1:1 (正方形)</option>
                            <option value="2:3">2:3 (写真)</option>
                            <option value="1:2">1:2 (长图)</option>
                            <option value="16:9">16:9 (横屏)</option>
                            <option value="9:16">9:16 (竖屏)</option>
                        </select>
                    </label>
                    <label>
                        锚点:
                        <select id="anchor">
                            <option value="Center">居中</option>
                            <option value="Left">靠左</option>
                            <option value="Right">靠右</option>
                        </select>
                    </label>
                </div>

                <div id="msg" style="font-size:12px; color:#999; margin-bottom:10px;">就绪</div>
                <img id="previewImg">
            </div>
        </div>
    </div>

    <script>
        let currentMode = 'crop';
        let loadedFile = null;

        const dz = document.getElementById('dropZone');
        dz.ondragover = (e) => { e.preventDefault(); dz.classList.add('dragover'); };
        dz.ondragleave = () => dz.classList.remove('dragover');
        dz.ondrop = (e) => {
            e.preventDefault();
            dz.classList.remove('dragover');
            handleFile(e.dataTransfer.files[0]);
        };

        function handleFile(file) {
            if (file && file.type.startsWith('image/')) {
                loadedFile = file;
                document.getElementById('dropText').innerText = `已加载: ${file.name}`;
                autoProcess();
            }
        }

        function switchMode(mode, el) {
            currentMode = mode;
            document.querySelectorAll('.tab').forEach(t => t.classList.remove('active'));
            el.classList.add('active');

            const config = document.getElementById('dynamicConfigs');
            if (mode === 'crop') {
                config.innerHTML = `<label>比例: <select id="ratio">
                                        <option value="1:1">1:1</option><option value="2:3">2:3</option>
                                        <option value="1:2">1:2</option><option value="16:9">16:9</option>
                                        <option value="9:16">9:16</option>
                                    </select></label>
                                    <label>锚点: <select id="anchor"><option value="Center">居中</option><option value="Left">靠左</option><option value="Right">靠右</option></select></label>`;
            } else if (mode === 'scale') {
                config.innerHTML = `<label>缩放倍数: <input type="number" id="scale" value="0.5" step="0.1" style="width:60px;"></label>`;
            } else {
                config.innerHTML = `<label>目标格式: <select id="format"><option value="webp">WebP</option><option value="png">PNG</option><option value="jpg">JPG</option><option value="bmp">BMP</option></select></label>`;
            }
            autoProcess();
        }

        async function autoProcess() {
            if (!loadedFile) return;
            const fd = new FormData();
            fd.append('file', loadedFile);
            let url = `/api/image/${currentMode}?`;
            if (currentMode === 'crop') url += `ratio=${document.getElementById('ratio').value}&anchor=${document.getElementById('anchor').value}`;
            else if (currentMode === 'scale') url += `scale=${document.getElementById('scale').value}`;
            else url += `format=${document.getElementById('format').value}`;

            document.getElementById('msg').innerText = "处理中...";
            try {
                const resp = await fetch(url, { method: 'POST', body: fd });
                if (resp.ok) {
                    const blob = await resp.blob();
                    const img = document.getElementById('previewImg');
                    img.src = URL.createObjectURL(blob);
                    img.style.display = 'block';
                    document.getElementById('msg').innerText = "处理成功";
                }
            } catch (e) { document.getElementById('msg').innerText = "请求失败"; }
        }
    </script>
</body>
</html>
